# این فایل به Railway (nixpacks) می‌گوید علاوه بر پایتون، این باینری‌های سیستمی
# را هم نصب کند. بدون این‌ها:
#   - تبدیل صدا به mp3 واقعی کار نمی‌کند (به‌جایش وبم/m4a خام می‌ماند)
#   - کیفیت‌های بالا (1080p+/4K) که نیاز به ادغام ویدیو+صدا دارند کار نمی‌کنند
#   - دانلود چندین‌برابر کندتر می‌شود (چون aria2 نیست)
[phases.setup]
nixPkgs = ["ffmpeg", "aria2"]
